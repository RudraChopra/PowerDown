# XcodeGen config. With XcodeGen installed (`brew install xcodegen`),
# run `xcodegen generate` in this folder to produce GrokWatch.xcodeproj.
# Otherwise follow the manual steps in README.md.
name: GrokWatch
options:
  bundleIdPrefix: com.milpitashacks
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_APP_SANDBOX: NO          # lets the app read your dataset / results folders directly
targets:
  GrokWatch:
    type: application
    platform: macOS
    sources:
      - path: GrokWatch
    info:
      path: GrokWatch/Info.plist
      properties:
        CFBundleDisplayName: GrokWatch
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Milpitas Hacks 2"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.milpitashacks.grokwatch
